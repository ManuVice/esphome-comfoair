substitutions:
  device_name: comfoair180
  friendly_name: "ComfoAir 180"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf  

# WLAN Zugangsdaten – hier anpassen!
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Zehnder Fallback"
    password: !secret comfoair_ap_password
  power_save_mode: none

captive_portal:

# Home Assistant API
api:
  encryption:
    key: !secret comfoair_encryption_key
  custom_services: true

ota:
  platform: esphome
  password: !secret ota_password

logger:
  baud_rate: 0  # Deaktiviert UART0 für Logger – wichtig!
#  level: DEBUG
#  baud_rate: 115200 # Wichtig für USB-Logging

# ============================================================
# UART Konfiguration
# UART1 → ComfoAir 180 (GPIO16=RX, GPIO17=TX)
# UART2 → Comfosense Proxy (GPIO13=RX, GPIO14=TX)
# ============================================================
uart:
  - id: uart_comfoair
    rx_pin: GPIO16
    tx_pin: GPIO17
    baud_rate: 9600

  - id: uart_comfosense
    rx_pin: GPIO33
    tx_pin: GPIO32
    baud_rate: 9600

# ============================================================
# External Component – julianpas/esphome-comfoair
# ============================================================
external_components:
  - source:
      type: git
      url: https://github.com/julianpas/esphome-comfoair
    components: ["comfoair"]

comfoair:
  id: comfoair_climate
  name: "ComfoAir 180"
  uart_id: uart_comfoair
  proxy_uart: uart_comfosense

  type:
    name: "Gerätetyp"
  size:
    name: "Gerätegröße"
 
  # Lüftungsstufe
  ventilation_level:
    name: "Lüftungsstufe"
  intake_fan_speed_rpm:
    name: "Zuluft Lüfter RPM"
  exhaust_fan_speed_rpm:
    name: "Abluft Lüfter RPM"
    
  # Temperaturen
  outside_air_temperature:
    name: "Aussenluft Temperatur"
  supply_air_temperature:
    name: "Zuluft Temperatur"
  return_air_temperature:
    name: "Abluft Temperatur"
  exhaust_air_temperature:
    name: "Fortluft Temperatur"
    
  # Status & Bypass
  filter_status:
    name: "Filter Status"
  summer_mode:
    name: "Sommermodus"
  bypass_valve_open:
    name: "Bypass offen"
  # nicht verbaut
#  preheating_state:
#    name: "Vorheizung aktiv"
  
  filter_hours:
    name: "Filter Betriebsstunden"
  level2_hours:
    name: "Betriebsstunden Stufe 2"
  frost_protection_active:
    name: "Frostschutz aktiv"

# ============================================================
# I²C für SPS30
# SDA = GPIO21, SCL = GPIO22
# ============================================================
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 100kHz
# ============================================================
# SPS30 Feinstaubsensor
# Pin 4 (Interface Select) muss mit GND für I2C Modus verbunden sein!
# ============================================================
sensor:
  - platform: sps30
    pm_1_0:
      name: "Feinstaub PM1.0"
      id: pm1_0
    pm_2_5:
      name: "Feinstaub PM2.5"
      id: pm2_5
    pm_4_0:
      name: "Feinstaub PM4.0"
      id: pm4_0
    pm_10_0:
      name: "Feinstaub PM10"
      id: pm10_0
    update_interval: 60s
    auto_cleaning_interval: 604800s # 1x pro Woche

  # WLAN Signalstärke zur Diagnose
  - platform: wifi_signal
    name: "WLAN Signalstärke"
    update_interval: 60s

# ============================================================
# Filter Reset Button
# ============================================================
button:
  - platform: restart
    id: reset_button
    name: "Reset Comfoair"
  - platform: template
    id: filter_reset_button
    name: "Filter zurücksetzen"
    on_press: 
      then:
        lambda: "id(comfoair_climate).reset_filters();"

# ============================================================
# Automatische Abschaltung bei Holzrauch
# PM2.5 > 25 µg/m³ für 2 Minuten → Lüftung aus
# PM2.5 < 10 µg/m³ für 10 Minuten → Lüftung Stufe 2
# ============================================================
# Diese Automation wird in Home Assistant konfiguriert!
# Beispiel siehe README unten.

# ============================================================
# Statusanzeige
# ============================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Adresse"
    
binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO4
      mode:
        input: true
        pullup: true
    name: "Mode button"
    filters:
      - invert:
      - delayed_on: 10ms
    on_multi_click:
      - timing:
        - ON for at most 1s
        - OFF for at most 1s
        - ON for at most 1s
        - OFF for at least 0.2s
        then:
          lambda: "id(comfoair_climate).set_level(3);"
      - timing:
        - ON for 1s to 2s
        - OFF for at least 0.5s
        then:
          lambda: "id(comfoair_climate).set_level(1);"
      - timing:
        - ON for at most 1s
        - OFF for at least 0.5s
        then:
          lambda: "id(comfoair_climate).set_level(2);"

